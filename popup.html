<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>历史记录过滤</title>
</head>
<body>
  <div class="history-popup">
    <h2 class="history-popup__title">历史记录过滤</h2>
    <p class="history-popup__subtitle">命中下列域名时，将自动清理对应浏览历史。</p>

    <div class="history-popup__meta">
      <span>过滤列表</span>
      <span id="listCount" class="history-popup__count">0</span>
    </div>

    <div id="blacklist" class="history-popup__list"></div>
    <p id="status" class="history-popup__status" aria-live="polite"></p>

    <div class="history-popup__actions">
      <button id="cleanNow" class="btn btn--secondary" type="button">立即清理</button>
    </div>

    <div class="history-popup__form">
      <input
        type="text"
        id="newDomain"
        class="history-popup__input"
        placeholder="例如：weibo.com"
        aria-label="新增过滤域名"
        autocomplete="off"
      >
      <button id="addDomain" class="btn btn--primary" type="button">添加</button>
    </div>
  </div>
  <script src="./js/popup.js"></script>
</body>
</html>
